<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Screenshot placeholder" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#10B981" fill-opacity="0.14"/>
    </pattern>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94A3B8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect x="1" y="1" width="1198" height="748" rx="16" fill="#94A3B8" fill-opacity="0.06" stroke="#94A3B8" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- browser chrome bar -->
  <path d="M1 17 A16 16 0 0 1 17 1 H1183 A16 16 0 0 1 1199 17 V64 H1 Z" fill="url(#chrome)"/>
  <line x1="1" y1="64" x2="1199" y2="64" stroke="#94A3B8" stroke-opacity="0.28" stroke-width="1.5"/>
  <circle cx="34" cy="33" r="6" fill="#EF4444" fill-opacity="0.55"/>
  <circle cx="58" cy="33" r="6" fill="#F59E0B" fill-opacity="0.55"/>
  <circle cx="82" cy="33" r="6" fill="#10B981" fill-opacity="0.65"/>
  <rect x="120" y="21" width="360" height="24" rx="12" fill="#94A3B8" fill-opacity="0.14"/>
  <text x="140" y="38" font-size="14" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">app.recurso.dev</text>

  <!-- body -->
  <rect x="1" y="64" width="1198" height="685" fill="url(#dots)"/>

  <!-- image glyph -->
  <g transform="translate(555 300)">
    <rect x="0" y="0" width="90" height="90" rx="14" fill="#94A3B8" fill-opacity="0.10" stroke="#10B981" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="#10B981" fill-opacity="0.55"/>
    <path d="M14 74 L38 48 L58 66 L72 54 L86 68 V78 A6 6 0 0 1 80 84 H20 A6 6 0 0 1 14 78 Z" fill="#10B981" fill-opacity="0.45"/>
  </g>

  <text x="600" y="440" text-anchor="middle" font-size="20" letter-spacing="2" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">SCREENSHOT PLACEHOLDER</text>
  <text x="600" y="470" text-anchor="middle" font-size="15" fill="#94A3B8">To be replaced with a product screenshot</text>
</svg>
