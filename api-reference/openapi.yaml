  /v1/subscriptions/{id}/usage:
    get:
      operationId: getSubscriptionUsage
      tags: [Usage]
      summary: Current-period usage for a subscription
      description: >
        Per-dimension usage inside the subscription's current billing period
        plus lifetime totals — the "you've used 4,231 of 10,000 api_calls"
        view. When the customer holds an entitlement limit for a feature_key
        equal to the dimension name, `limit_value` and `remaining` are
        populated (null otherwise; `remaining` may be negative when over the
        limit).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Subscription usage report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionUsage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # --- Phase 2 auth: password reset, TOTP MFA, session management ---

  /auth/login/mfa:
    post:
      operationId: loginMFA
      tags: [Auth]
      summary: Complete a two-step (MFA) login
      description: >
        Second step of login for MFA-enabled users. Exchanges the short-lived
        single-use `mfa_token` returned by `/auth/login` (plus a TOTP code or an
        unused backup code) for a session (sets the httpOnly `recurso_session`
        cookie). The mfa_token and any backup code used are consumed. Errors are
        deliberately generic.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token:
                  type: string
                  description: The single-use challenge token from /auth/login.
                code:
                  type: string
                  description: A current TOTP code or an unused backup code.
      responses:
        '200':
          description: Authenticated. Sets recurso_session cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tenant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [Auth]
      summary: Request a password reset link
      description: >
        Always returns 200 with a generic message, whether or not the account
        exists (no enumeration). If the account exists, a single-use reset token
        is created and a reset link emailed to the user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Generic acknowledgement (sent regardless of account existence).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [Auth]
      summary: Reset a password with a token
      description: >
        Consumes a valid (unused, unexpired) reset token, sets the new bcrypt
        password, and revokes ALL of that user's sessions (forces re-login
        everywhere). Invalid/expired/used tokens return a generic 400.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password, minLength: 8 }
      responses:
        '200':
          description: Password reset; all sessions revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/auth/mfa/setup:
    post:
      operationId: mfaSetup
      tags: [Auth]
      summary: Begin TOTP MFA setup
      description: >
        Generates a TOTP secret for the logged-in user and returns the
        otpauth:// URI (for QR display) plus the raw secret (for manual entry).
        MFA is NOT enabled until a code is confirmed via /v1/auth/mfa/verify.
        Requires a logged-in user session (API-key callers are rejected).
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Provisioning data for the authenticator app.
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  otpauth_url: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/auth/mfa/verify:
    post:
      operationId: mfaVerify
      tags: [Auth]
      summary: Confirm and enable TOTP MFA
      description: >
        Validates a TOTP code against the pending secret, enables MFA, and
        returns a fresh set of one-time backup codes. The backup codes are shown
        exactly once — only their hashes are stored.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: MFA enabled; one-time backup codes returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_enabled: { type: boolean }
                  backup_codes:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/auth/mfa/disable:
    post:
      operationId: mfaDisable
      tags: [Auth]
      summary: Disable TOTP MFA
      description: >
        Verifies a TOTP or unused backup code, then disables MFA and wipes the
        stored secret and all backup codes.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: MFA disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_enabled: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/auth/sessions:
    get:
      operationId: listSessions
      tags: [Auth]
      summary: List active sessions
      description: >
        Lists the logged-in user's unexpired sessions, flagging the request's own
        session with `current: true`. Requires a logged-in user session.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: The user's active sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        user_agent: { type: string }
                        created_at: { type: string, format: date-time }
                        expires_at: { type: string, format: date-time }
                        current: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      operationId: revokeOtherSessions
      tags: [Auth]
      summary: Revoke all other sessions
      description: >
        Revokes every session belonging to the user except the current one
        ("log out everywhere else"). Requires a live session cookie.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Other sessions revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [Auth]
      summary: Revoke a single session
      description: >
        Revokes one of the user's OWN sessions. A session that does not exist or
        belongs to another user returns 404 (no ownership leak).
      security:
        - sessionCookie: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Session revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # --- Phase 3 auth: OAuth social login (Google + GitHub) ---
  /auth/oauth/providers:
    get:
      tags: [Auth]
      summary: List social-login providers and whether each is enabled
      description: >
        Returns every provider this build understands with an `enabled` flag. A
        provider is enabled only when its client id AND secret env vars are set
        (GOOGLE_CLIENT_ID/GOOGLE_CLIENT_SECRET, GITHUB_CLIENT_ID/GITHUB_CLIENT_SECRET).
        The dashboard uses this to show/hide the social buttons.
      responses:
        '200':
          description: Provider list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items: { $ref: '#/components/schemas/OAuthProviderStatus' }
  /auth/oauth/{provider}/start:
    get:
      tags: [Auth]
      summary: Begin an OAuth login (redirect to the provider)
      description: >
        Generates a CSRF `state` and a PKCE verifier, binds them into a
        short-lived signed httpOnly cookie (`recurso_oauth_state`, scoped to
        /auth/oauth), and 302-redirects to the provider's authorize URL. Unknown
        or disabled providers return 404.
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string, enum: [google, github] } }
      responses:
        '302':
          description: Redirect to the provider's authorize URL. Sets the state cookie.
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth callback (provider redirects here)
      description: >
        Validates `state` against the cookie (constant-time), exchanges the code
        with PKCE, fetches userinfo and requires a verified email (Google:
        email_verified==true; GitHub: a primary verified email). Then
        find-or-create: (1) an existing identity logs in; (2) a matching verified
        email links a new identity and logs in; (3) a brand-new email creates a
        tenant + owner user. On success sets the `recurso_session` cookie and
        302s to `{DASHBOARD_URL}/`. On failure 302s to
        `{DASHBOARD_URL}/login?error=oauth` (never an open redirect). A state
        mismatch returns 403.
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string, enum: [google, github] } }
        - { name: code, in: query, required: false, schema: { type: string } }
        - { name: state, in: query, required: false, schema: { type: string } }
      responses:
        '302':
          description: Redirect to the dashboard on success, or to the login error page on failure. Sets the session cookie on success.
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # --- Phase 3 auth: SAML SSO (per-tenant admin config + SP endpoints) ---
  /v1/sso/connection:
    get:
      tags: [Auth]
      summary: Get the caller tenant's SAML SSO connection
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: The tenant's SSO connection.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SSOConnection' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Auth]
      summary: Create or update the tenant's SAML IdP configuration (owner/admin only)
      description: >
        Upserts the tenant's IdP config. Provide either `idp_metadata_xml`, or
        all of `idp_entity_id` + `idp_sso_url` + `idp_certificate`. Enabling a
        connection that is not fully configured is rejected. Members get 403.
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SSOConnectionUpsertRequest' }
      responses:
        '200':
          description: The upserted connection.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SSOConnection' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Auth]
      summary: Delete the tenant's SAML SSO connection (owner/admin only)
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Connection removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/saml/{tenantID}/metadata:
    get:
      tags: [Auth]
      summary: SP metadata XML for a tenant
      description: Returns the Service Provider metadata document (application/samlmetadata+xml). 404 when the tenant has no SSO connection.
      parameters:
        - { name: tenantID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: SP metadata XML.
          content:
            application/samlmetadata+xml:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/saml/{tenantID}/login:
    get:
      tags: [Auth]
      summary: SP-initiated SAML login (redirect to the IdP)
      description: 302-redirects to the IdP with a SAML AuthnRequest when the tenant's connection is enabled; 404 otherwise.
      parameters:
        - { name: tenantID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '302':
          description: Redirect to the IdP.
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/saml/{tenantID}/acs:
    post:
      tags: [Auth]
      summary: Assertion Consumer Service (IdP posts the SAMLResponse here)
      description: >
        Validates the SAMLResponse against the tenant's IdP certificate, extracts
        the email, and maps it to an EXISTING user in the tenant (no JIT
        provisioning). On success sets the `recurso_session` cookie and 302s to
        the dashboard. Unknown email → 403; disabled/unconfigured tenant → 404;
        invalid assertion → 401.
      parameters:
        - { name: tenantID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse: { type: string }
                RelayState: { type: string }
      responses:
        '302':
          description: Redirect to the dashboard on success. Sets the session cookie.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Tenant API key obtained from `POST /auth/register` or `POST /v1/developer/keys`.
    portalSession:
      type: apiKey
      in: cookie
      name: portal_session
      description: Customer-portal session cookie issued by `GET /portal/auth/verify`.
    sessionCookie:
      type: apiKey
      in: cookie
      name: recurso_session
      description: >
        Dashboard user session cookie (httpOnly) issued by `POST /auth/register`
        and `POST /auth/login`. v1 endpoints accept EITHER this cookie or the
        tenant API key (`bearerAuth`).

  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SearchQuery:
      name: q
      in: query
      description: Free-text search filter.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      description: Records per page (capped at 250).
      schema:
        type: integer
        minimum: 1
        maximum: 250
        default: 50
    AccountingProvider:
      name: provider
      in: path
      required: true
      description: Accounting provider.
      schema:
        type: string
        enum: [quickbooks, xero]

  responses:
    BadRequest:
      description: The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid credentials (API key or session cookie).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not permitted (insufficient role).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: The request conflicts with current state (e.g. duplicate email, last owner).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Entitlement:
      type: object
      properties:
        id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        feature_key: { type: string }
        kind: { type: string, enum: [boolean, limit] }
        bool_value: { type: boolean, nullable: true }
        limit_value: { type: integer, format: int64, nullable: true }
    EntitlementInput:
      type: object
      required: [feature_key, kind]
      properties:
        feature_key: { type: string }
        kind: { type: string, enum: [boolean, limit] }
        bool_value: { type: boolean }
        limit_value: { type: integer, format: int64 }
    PlanChangePreview:
      type: object
      description: >-
        Read-only proration breakdown for a subscription plan change. Monetary
        fields are in the currency's smallest unit (e.g. paise/cents).
      properties:
        subscription_id: { type: string, format: uuid }
        current_plan_id: { type: string, format: uuid }
        new_plan_id: { type: string, format: uuid }
        currency: { type: string }
        credit_amount:
          type: integer
          format: int64
          description: Credit for unused time on the current plan.
        charge_amount:
          type: integer
          format: int64
          description: Prorated charge for the remaining period on the new plan.
        net_amount:
          type: integer
          format: int64
          description: charge_amount - credit_amount, before tax.
        tax_amount:
          type: integer
          format: int64
          description: Tax on a positive net (0 for credits).
        total_amount:
          type: integer
          format: int64
          description: net_amount + tax_amount; the immediate proration invoice total.
        effective_date:
          type: string
          format: date-time
        next_invoice_amount:
          type: integer
          format: int64
          description: Full new-plan charge incl. tax at the next renewal.
        is_upgrade:
          type: boolean
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          description: Structured error detail.
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              examples: [BAD_REQUEST, UNAUTHORIZED, NOT_FOUND, CONFLICT, VALIDATION_ERROR, INVALID_API_KEY, RATE_LIMITED, INTERNAL_ERROR]
            message:
              type: string
              description: Human-readable explanation.

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        components:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              error:
                type: string

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        data_region:
          type: string
        base_currency:
          type: string
          description: ISO 4217 code (default USD).
        organization_id:
          type: [string, 'null']
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required: [name, code, interval_unit, interval_count, amount, currency]
      properties:
        name:
          type: string
        code:
          type: string
          description: Unique plan code (e.g. `gold-monthly`).
        interval_unit:
          type: string
          enum: [day, week, month, year]
        interval_count:
          type: integer
          minimum: 1
        amount:
          type: integer
          format: int64
          description: Price in the lowest currency unit (e.g. cents/paise).
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 code.
        hsn_code:
          type: string
          description: >-
            Optional HSN/SAC code for this plan. Each invoice line for the plan
            is taxed at this code's GST rate. Empty falls back to the tenant SAC
            (then the 998314 default).

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        interval_unit:
          type: string
          enum: [day, week, month, year]
        interval_count:
          type: integer
        active:
          type: boolean
        hsn_code:
          type: string
          description: HSN/SAC code the plan's invoice lines are taxed at (empty = tenant SAC default).
        created_at:
          type: string
          format: date-time
        prices:
          type: array
          items:
            $ref: '#/components/schemas/Price'

    Price:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        currency:
          type: string
          description: ISO 4217 code.
        amount:
          type: integer
          format: int64
          description: Price in the lowest currency unit.
        type:
          type: string
          enum: [recurring, one_time]
        created_at:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        tax_id:
          type: string
        gstin:
          type: string
          description: Indian GST identification number (B2B customers).
        tax_type:
          type: string
          enum: [business, consumer]
        place_of_supply:
          type: string
          description: Indian state code for GST place of supply.
        line1:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 code.

    BillingAddress:
      type: object
      properties:
        line1:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: [string, 'null']
        phone:
          type: string
        tax_id:
          type: [string, 'null']
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        ledger_account_id:
          type: string
          format: uuid
        gstin:
          type: [string, 'null']
        tax_type:
          type: string
        place_of_supply:
          type: [string, 'null']
        referral_code:
          type: [string, 'null']
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
        risk_factors:
          type: [object, 'null']
        card_brand:
          type: string
        card_last4:
          type: string
        card_exp_month:
          type: integer
        card_exp_year:
          type: integer
        card_token_id:
          type: string
        card_fingerprint:
          type: string
        created_at:
          type: string
          format: date-time

    SubscriptionStatus:
      type: string
      enum: [trialing, active, past_due, paused, canceled, unpaid]

    CreateSubscriptionRequest:
      type: object
      required: [customer_id, plan_id]
      properties:
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        coupon_code:
          type: string
        start_date:
          type: string
          format: date-time
        billing_anchor_type:
          type: string
          enum: [acquisition, first_of_month]
        payment_terms:
          type: string
          enum: [net0, net15, net30, net60]

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        canceled_at:
          type: string
          format: date-time
        cancellation_reason:
          type: string
        cancellation_feedback:
          type: string
        billing_anchor:
          type: string
          format: date-time
        billing_anchor_type:
          type: string
        billing_anchor_day:
          type: integer
        payment_terms:
          type: string
        coupon_id:
          type: string
          format: uuid
        reference_id:
          type: string
        mandate_id:
          type: string
          format: uuid
        razorpay_subscription_id:
          type: string
        stripe_subscription_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CancelSubscriptionRequest:
      type: object
      required: [reason]
      properties:
        cancel_at_period_end:
          type: boolean
          description: Defaults to true when `immediately` is false.
        immediately:
          type: boolean
        reason:
          type: string
          enum:
            - too_expensive
            - not_using
            - switching_competitor
            - missing_features
            - technical_issues
            - customer_service
            - temporary_pause
            - other
        feedback:
          type: string
        revoke_consent:
          type: boolean
          description: Also revoke the recurring-payment consent (RBI compliance).

    CancelSubscriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        cancel_at_period_end:
          type: boolean
        cancelled_at:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancellation_reason:
          type: string
        message:
          type: string

    UnbilledCharge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        amount:
          type: integer
          format: int64
          description: Amount in the lowest currency unit.
        currency:
          type: string
        description:
          type: string
        hsn_code:
          type: string
          description: HSN/SAC code the charge is taxed at on the invoice.
        status:
          type: string
          enum: [pending, invoiced, canceled]
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        subscription_id:
          type: [string, 'null']
          format: uuid
        customer_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        billing_reason:
          type: string
        amount_due:
          type: integer
          format: int64
        amount_paid:
          type: integer
          format: int64
        currency:
          type: string
        subtotal:
          type: integer
          format: int64
        tax_amount:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        igst_amount:
          type: integer
          format: int64
        cgst_amount:
          type: integer
          format: int64
        sgst_amount:
          type: integer
          format: int64
        hsn_code:
          type: string
        irn:
          type: string
          description: Invoice Reference Number issued by the IRP (Indian e-invoicing).
        ack_no:
          type: string
        signed_qr_code:
          type: string
        e_invoice_status:
          type: string
        ack_date:
          type: string
        e_invoice_retry_count:
          type: integer
        e_invoice_next_retry_at:
          type: [string, 'null']
          format: date-time
        e_invoice_error_message:
          type: string
        tds_amount:
          type: integer
          format: int64
        status:
          type: string
          enum: [draft, open, paid, void, uncollectible, past_due]
        created_at:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
        payment_terms:
          type: string
        exchange_rate:
          type: number
        base_currency_total:
          type: integer
          format: int64
        base_currency:
          type: string
        next_retry_at:
          type: string
          format: date-time
        retry_count:
          type: integer
        payment_wall_active:
          type: boolean
        line_items:
          type: array
          description: >-
            Itemized invoice lines. Each line carries its own HSN/SAC code and
            per-line GST breakdown; line amounts and per-line taxes reconcile
            exactly to subtotal/tax_amount. Omitted for legacy invoices created
            before itemization.
          items:
            $ref: '#/components/schemas/InvoiceItem'

    InvoiceItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        description:
          type: string
        hsn_code:
          type: string
          description: HSN/SAC code for the line (tenant SAC in Phase 1).
        quantity:
          type: integer
        unit_amount:
          type: integer
          format: int64
          description: Per-unit amount in the invoice's lowest currency unit.
        amount:
          type: integer
          format: int64
          description: Line total (quantity * unit_amount) in lowest currency unit.
        tax_rate:
          type: number
          description: Effective GST rate for the line as a percent (e.g. 18.0).
        cgst_amount:
          type: integer
          format: int64
        sgst_amount:
          type: integer
          format: int64
        igst_amount:
          type: integer
          format: int64
        taxable_amount:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    EInvoiceStatus:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        e_invoice_status:
          type: string
        irn:
          type: string
        ack_no:
          type: string
        ack_date:
          type: string
        signed_qr_code:
          type: string
        retry_count:
          type: integer
        next_retry_at:
          type: [string, 'null']
          format: date-time
        error_message:
          type: string

    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        discount_type:
          type: string
          enum: [percent, amount]
        discount_value:
          type: integer
          format: int64
        duration:
          type: string
          enum: [forever, once, repeating]
        duration_months:
          type: [integer, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreditNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        invoice_id:
          type: [string, 'null']
          format: uuid
        reference:
          type: [string, 'null']
        amount:
          type: integer
          format: int64
        balance:
          type: integer
          format: int64
          description: Remaining unapplied credit.
        currency:
          type: string
        status:
          type: string
          enum: [issued, used, void]
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        customer:
          $ref: '#/components/schemas/Customer'

    QuoteStatus:
      type: string
      enum: [draft, sent, accepted, declined, expired]

    LineItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
        unit_price:
          type: integer
          description: Price per unit in the lowest currency unit.
        amount:
          type: integer
          description: quantity x unit_price, in the lowest currency unit.

    CreateQuoteRequest:
      type: object
      required: [customer_id, line_items]
      properties:
        customer_id:
          type: string
          format: uuid
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItem'
        currency:
          type: string
        valid_until:
          type: [string, 'null']
          format: date-time
        notes:
          type: string
        terms:
          type: string
        tax_amount:
          type: integer
        discount_amount:
          type: integer

    Quote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        quote_number:
          type: string
        status:
          $ref: '#/components/schemas/QuoteStatus'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        subtotal:
          type: integer
        tax_amount:
          type: integer
        discount_amount:
          type: integer
        total:
