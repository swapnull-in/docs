    get:
      operationId: accountingOAuthCallback
      tags: [Accounting]
      summary: OAuth callback for accounting providers
      description: Redirect target for QuickBooks/Xero. Exchanges the authorization code for tokens and stores (or refreshes) the connection.
      parameters:
        - $ref: '#/components/parameters/AccountingProvider'
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: HMAC-signed state issued by the connect endpoint.
          schema:
            type: string
        - name: realmId
          in: query
          required: false
          description: QuickBooks company (realm) ID.
          schema:
            type: string
      responses:
        '200':
          description: Connection stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: connected
                  connection_id:
