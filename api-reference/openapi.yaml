          type: string
          format: uuid
        endpoint_url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, succeeded, failed]
          description: >
            Derived delivery state. `pending` deliveries are still being
            retried by the worker; `failed` means retries were exhausted.
