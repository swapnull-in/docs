openapi: 3.1.0
info:
  title: Recurso API
  version: 1.0.0
  description: |
    The Recurso billing engine REST API.

    Authenticate by passing your API key as a bearer token:

        Authorization: Bearer <api_key>

    Obtain an API key by registering a tenant via `POST /auth/register`.
    All authenticated endpoints live under the `/v1` prefix. Mutating
    endpoints support idempotency via the `X-Idempotency-Key` header.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://billing.example.com
    description: Example deployment — substitute the base URL of your own Recurso deployment.

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health, version, and API metadata
  - name: Auth
    description: Tenant registration
  - name: Plans
    description: Product catalog plans
  - name: Customers
    description: Customer management
  - name: Subscriptions
    description: Subscription lifecycle
  - name: Invoices
    description: Invoices, PDFs, and Indian GST e-invoicing
  - name: Coupons
    description: Discounts
  - name: Usage
    description: Metered usage events
  - name: Credit Notes
    description: Customer credits
  - name: Quotes
    description: Quote-to-invoice lifecycle
  - name: Webhooks
    description: Webhook endpoint management and event feed
  - name: Analytics
    description: Revenue analytics
  - name: Checkout
    description: Public hosted checkout for invoices
  - name: Payments
    description: Payment order creation
  - name: Inbound Webhooks
    description: Receivers for payment-gateway callbacks (Razorpay, Stripe)
  - name: Customer Portal
    description: Customer-facing portal — magic-link auth and session-scoped data
  - name: Developer
    description: API key management
  - name: Account
    description: Tenant account settings
  - name: Finance
    description: Ledger accounts, entries, reconciliation, and revenue recognition
  - name: Settings
    description: Tax (GST) and e-invoicing (IRP) configuration
  - name: Consents
    description: Consent records for RBI-compliant recurring billing
  - name: Referrals
    description: Customer referral program
  - name: Gifts
    description: Gift subscriptions
  - name: Mandates
    description: UPI Autopay mandates
  - name: Offline Payments
    description: Virtual accounts and manually recorded payments
  - name: Organizations
    description: Multi-entity organizations grouping several tenants
  - name: Accounting
    description: QuickBooks / Xero accounting integrations
  - name: Churn
    description: Churn risk scoring and alerts
  - name: Cancel Flows
    description: Configurable retention flows shown at cancellation time
  - name: Dunning
    description: Dunning analytics and multi-channel dunning campaigns

paths:
  /health:
    get:
      operationId: getHealth
      tags: [System]
      summary: Health check
      description: Reports overall service health plus per-component status (Postgres, Redis, TigerBeetle).
      security: []
      responses:
        '200':
          description: Service is healthy (or degraded but serving).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: A critical dependency (Postgres) is down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /version:
    get:
      operationId: getVersion
      tags: [System]
      summary: Build version
      security: []
      responses:
        '200':
          description: The running build version.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    examples: [dev, v0.1.0]

  /openapi.yaml:
    get:
      operationId: getOpenAPIYAML
      tags: [System]
      summary: This OpenAPI document (YAML)
      security: []
      responses:
        '200':
          description: The OpenAPI 3.1 specification in YAML.
          content:
            application/yaml:
              schema:
                type: string

  /openapi.json:
    get:
      operationId: getOpenAPIJSON
      tags: [System]
      summary: This OpenAPI document (JSON)
      security: []
      responses:
        '200':
          description: The OpenAPI 3.1 specification in JSON.
          content:
            application/json:
              schema:
                type: object

  /auth/register:
    post:
      operationId: registerTenant
      tags: [Auth]
      summary: Register a tenant (signup)
      description: Creates a tenant and returns its first API key. The key is shown only once.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Tenant registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
                  api_key:
                    type: string
                    description: The raw API key. Store it securely — it is not retrievable later.
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/plans:
    post:
      operationId: createPlan
      tags: [Plans]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Plan created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listPlans
      tags: [Plans]
      summary: List plans
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Plans for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/customers:
    post:
      operationId: createCustomer
      tags: [Customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listCustomers
      tags: [Customers]
      summary: List customers
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - name: country
          in: query
          description: Filter by ISO 3166-1 alpha-2 country code.
          schema:
            type: string
        - name: status
          in: query
          description: Filter by customer status.
          schema:
            type: string
            enum: [active, inactive]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Customers for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/customers/{id}/payment-method:
    put:
      operationId: updateCustomerPaymentMethod
      tags: [Customers]
      summary: Update a customer's card on file
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_brand, card_last4, card_exp_month, card_exp_year]
              properties:
                card_brand:
                  type: string
                  examples: [visa]
                card_last4:
                  type: string
                  minLength: 4
                  maxLength: 4
                card_exp_month:
                  type: integer
                  minimum: 1
                  maximum: 12
                card_exp_year:
                  type: integer
                  minimum: 2020
      responses:
        '200':
          description: Payment method updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions:
    post:
      operationId: createSubscription
      tags: [Subscriptions]
      summary: Create a subscription
      description: Creates the subscription, applies an optional coupon, and generates the first invoice.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listSubscriptions
      tags: [Subscriptions]
      summary: List subscriptions
      parameters:
        - name: status
          in: query
          description: Filter by subscription status.
          schema:
            $ref: '#/components/schemas/SubscriptionStatus'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Subscriptions for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}:
    put:
      operationId: updateSubscription
      tags: [Subscriptions]
      summary: Change a subscription's plan (upgrade/downgrade)
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/cancel:
    post:
      operationId: cancelSubscription
      tags: [Subscriptions]
      summary: Cancel a subscription
      description: Defaults to cancellation at period end unless `immediately` is true.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSubscriptionRequest'
      responses:
        '200':
          description: Cancellation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/reactivate:
    post:
      operationId: reactivateSubscription
      tags: [Subscriptions]
      summary: Reactivate a cancelled subscription
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Subscription reactivated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/pause:
    post:
      operationId: pauseSubscription
      tags: [Subscriptions]
      summary: Pause a subscription
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Paused subscription.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/resume:
    post:
      operationId: resumeSubscription
      tags: [Subscriptions]
      summary: Resume a paused subscription
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Resumed subscription.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/charges:
    post:
      operationId: addUnbilledCharge
      tags: [Subscriptions]
      summary: Add an unbilled (ad-hoc) charge
      description: The charge is picked up on the subscription's next invoice.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency, description]
              properties:
                amount:
                  type: integer
                  format: int64
                  description: Amount in the lowest currency unit (e.g. cents/paise).
                currency:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Charge recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnbilledCharge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listUnbilledCharges
      tags: [Subscriptions]
      summary: List unbilled charges for a subscription
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Pending unbilled charges.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UnbilledCharge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/subscriptions/{id}/advance:
    post:
      operationId: generateAdvanceInvoice
      tags: [Subscriptions]
      summary: Generate an advance invoice
      description: Bills the subscription ahead of time for the given number of periods.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periods]
              properties:
                periods:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Advance invoice created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/invoices:
    get:
      operationId: listInvoices
      tags: [Invoices]
      summary: List invoices
      responses:
        '200':
          description: Invoices for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/invoices/{id}/pdf:
    get:
      operationId: downloadInvoicePDF
      tags: [Invoices]
      summary: Download a printable invoice
      description: Returns a print-ready HTML rendering of the invoice (public, rate-limited).
      security: []
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Print-ready invoice document.
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/invoices/{id}/einvoice:
    get:
      operationId: getEInvoiceStatus
      tags: [Invoices]
      summary: Get e-invoice (IRN) status
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: E-invoice status details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EInvoiceStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/invoices/{id}/einvoice/retry:
    post:
      operationId: retryEInvoice
      tags: [Invoices]
      summary: Retry e-invoice generation
      description: Manually retries IRN generation for a failed e-invoice.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Retry initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: GSP response for the retry attempt.
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/invoices/{id}/einvoice/cancel:
    post:
      operationId: cancelEInvoice
      tags: [Invoices]
      summary: Cancel an e-invoice (IRN)
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancel_code, reason]
              properties:
                cancel_code:
                  type: integer
                  description: IRP cancellation code (e.g. 1 = duplicate, 3 = data entry mistake).
                reason:
                  type: string
      responses:
        '200':
          description: E-invoice cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/coupons:
    post:
      operationId: createCoupon
      tags: [Coupons]
      summary: Create a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, discount_type, discount_value, duration]
              properties:
                code:
                  type: string
                discount_type:
                  type: string
                  enum: [percent, amount]
                discount_value:
                  type: integer
                  format: int64
                  exclusiveMinimum: 0
                  description: Percentage (0-100) when `discount_type` is `percent`, otherwise amount in the lowest currency unit.
                duration:
                  type: string
                  enum: [forever, once, repeating]
                duration_months:
                  type: integer
                  description: Required when `duration` is `repeating`.
      responses:
        '201':
          description: Coupon created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listCoupons
      tags: [Coupons]
      summary: List coupons
      responses:
        '200':
          description: Coupons for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/usage/events:
    post:
      operationId: recordUsageEvent
      tags: [Usage]
      summary: Record a usage event
      description: >
        Reports metered usage against a subscription dimension (e.g. `api_calls`).
        The subscription must belong to the authenticated tenant (404 otherwise)
        and `customer_id` must match the subscription's customer (400 otherwise).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_id, customer_id, dimension, quantity]
              properties:
                subscription_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                dimension:
                  type: string
                  examples: [api_calls]
                quantity:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Event recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: recorded
                  event_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/credit-notes:
    post:
      operationId: createCreditNote
      tags: [Credit Notes]
      summary: Create a credit note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, amount, currency]
              properties:
                customer_id:
                  type: string
                  format: uuid
                invoice_id:
                  type: [string, 'null']
                  format: uuid
                amount:
                  type: integer
                  format: int64
                  exclusiveMinimum: 0
                  description: Amount in the lowest currency unit.
                currency:
                  type: string
                reason:
                  type: string
      responses:
        '201':
          description: Credit note issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CreditNote'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listCreditNotes
      tags: [Credit Notes]
      summary: List credit notes
      parameters:
        - name: customer_id
          in: query
          description: Filter by customer.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Credit notes for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CreditNote'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes:
    post:
      operationId: createQuote
      tags: [Quotes]
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '201':
          description: Quote created (status `draft`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Quote'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listQuotes
      tags: [Quotes]
      summary: List quotes
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/QuoteStatus'
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          description: Free-text search.
          schema:
            type: string
      responses:
        '200':
          description: Quotes for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quote'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes/{id}:
    get:
      operationId: getQuote
      tags: [Quotes]
      summary: Retrieve a quote
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: The quote.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Quote'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateQuote
      tags: [Quotes]
      summary: Update a draft quote
      description: Only quotes in `draft` status are editable.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '200':
          description: Updated quote.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Quote'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteQuote
      tags: [Quotes]
      summary: Delete a draft quote
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Quote deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes/{id}/send:
    post:
      operationId: sendQuote
      tags: [Quotes]
      summary: Send a quote to the customer
      description: Transitions the quote from `draft` to `sent`.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Quote sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes/{id}/accept:
    post:
      operationId: acceptQuote
      tags: [Quotes]
      summary: Mark a quote as accepted
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Quote accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes/{id}/decline:
    post:
      operationId: declineQuote
      tags: [Quotes]
      summary: Mark a quote as declined
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Quote declined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/quotes/{id}/convert:
    post:
      operationId: convertQuoteToInvoice
      tags: [Quotes]
      summary: Convert an accepted quote to an invoice
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '201':
          description: Invoice created from the quote.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Invoice'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/webhooks:
    post:
      operationId: createWebhookEndpoint
      tags: [Webhooks]
      summary: Create a webhook endpoint
      description: The signing `secret` is returned only in this response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  description: Event types to deliver (see `GET /v1/events/types`).
                  items:
                    type: string
      responses:
        '201':
          description: Endpoint created (includes the signing secret).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WebhookEndpoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listWebhookEndpoints
      tags: [Webhooks]
      summary: List webhook endpoints
      responses:
        '200':
          description: Webhook endpoints (secrets omitted).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEndpoint'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhookEndpoint
      tags: [Webhooks]
      summary: Delete a webhook endpoint
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Endpoint deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/webhooks/{id}/deliveries:
    get:
      operationId: listWebhookEndpointDeliveries
      tags: [Webhooks]
      summary: List deliveries for a webhook endpoint
      description: Recent delivery attempts to this endpoint, newest first.
      parameters:
        - $ref: '#/components/parameters/PathID'
        - $ref: '#/components/parameters/Limit'
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: status
          in: query
          description: Filter by derived delivery status.
          schema:
            type: string
            enum: [pending, succeeded, failed]
      responses:
        '200':
          description: Deliveries for the endpoint.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventDelivery'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events:
    get:
      operationId: listEvents
      tags: [Webhooks]
      summary: List events
      description: Chronological feed of billing events emitted for this tenant.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Events for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/types:
    get:
      operationId: listEventTypes
      tags: [Webhooks]
      summary: List supported event types
      responses:
        '200':
          description: All event types that can be subscribed to.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                      examples: [invoice.paid]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/{id}/deliveries:
    get:
      operationId: listEventDeliveries
      tags: [Webhooks]
      summary: List deliveries for an event
      description: Delivery attempts of this event across all webhook endpoints, newest first.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Deliveries for the event.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventDelivery'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}/redeliver:
    post:
      operationId: redeliverEvent
      tags: [Webhooks]
      summary: Redeliver an event
      description: >
        Re-enqueues delivery of the event to every active endpoint currently
        subscribed to its type. Existing delivery records are reset for a fresh
        attempt (repeated calls do not create duplicates); endpoints without a
        record get a new one. The delivery worker picks the work up on its next
        poll.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '202':
          description: Redelivery queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      event_id:
                        type: string
                        format: uuid
                      deliveries_queued:
                        type: integer
                        description: Number of endpoint deliveries queued (0 when no active endpoint subscribes to the event type).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/analytics/mrr:
    get:
      operationId: getMRR
      tags: [Analytics]
      summary: Monthly recurring revenue
      description: Current MRR across active subscriptions. Responses are cached for up to 5 minutes.
      responses:
        '200':
          description: Current MRR.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MRRMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /checkout/{id}:
    get:
      operationId: showCheckout
      tags: [Checkout]
      summary: Fetch checkout data for an invoice
      description: Returns the invoice summary rendered by the hosted checkout page. Public and rate-limited.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Invoice summary for checkout.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CheckoutInvoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /checkout/{id}/pay:
    post:
      operationId: initiateCheckoutPayment
      tags: [Checkout]
      summary: Initiate payment for an invoice
      description: Creates a payment order on the configured gateway for an unpaid invoice.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Gateway order created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      order_id:
                        type: string
                      amount:
                        type: integer
                        format: int64
                        description: Amount in the lowest currency unit.
                      currency:
                        type: string
                      invoice_id:
                        type: string
                        format: uuid
                      invoice_number:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /checkout/{id}/success:
    get:
      operationId: checkoutSuccess
      tags: [Checkout]
      summary: Confirm checkout success
      description: Marks the invoice as paid (demo flow) and returns a confirmation payload.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Invoice confirmed paid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        const: paid
                      invoice_id:
                        type: string
                        format: uuid
                      invoice_number:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/order:
    post:
      operationId: createPaymentOrder
      tags: [Payments]
      summary: Create a gateway payment order for an invoice
      description: |
        Creates a payment order on the configured payment gateway. Public and rate-limited.
        Note: the response uses the gateway port's Go field names (capitalized) verbatim.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Gateway order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhooks/razorpay:
    post:
      operationId: handleRazorpayWebhook
      tags: [Inbound Webhooks]
      summary: Razorpay webhook receiver
      description: |
        Inbound receiver for Razorpay events (payment captured/failed, mandate lifecycle,
        virtual-account credits). The raw body must be signed with the
        `X-Razorpay-Signature` HMAC header; unsigned or tampered requests are rejected.
        This endpoint is called by Razorpay, not by API consumers.
      security: []
      parameters:
        - name: X-Razorpay-Signature
          in: header
          required: true
          description: HMAC-SHA256 signature of the raw request body.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Razorpay event payload.
      responses:
        '200':
          description: Event processed (or deliberately ignored).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, ignored]
                  reason:
                    type: string
                    description: Present when the event was ignored.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/stripe:
    post:
      operationId: handleStripeWebhook
      tags: [Inbound Webhooks]
      summary: Stripe webhook receiver
      description: |
        Inbound receiver for Stripe events. The raw body must be signed with the
        `Stripe-Signature` header; unsigned or tampered requests are rejected.
        This endpoint is called by Stripe, not by API consumers.
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          description: Stripe webhook signature header.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event payload.
      responses:
        '200':
          description: Event processed (or deliberately ignored).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, ignored]
                  reason:
                    type: string
                    description: Present when the event was ignored.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/invoices/{id}/preview:
    get:
      operationId: previewInvoiceHTML
      tags: [Invoices]
      summary: Preview an invoice as HTML
      description: Returns the same print-ready HTML rendering as the PDF endpoint (public, rate-limited).
      security: []
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Print-ready invoice document.
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /portal/{customer_id}:
    get:
      operationId: showPortalDashboard
      tags: [Customer Portal]
      summary: Legacy HTML customer dashboard
      description: Server-rendered HTML dashboard listing the customer's invoices. Public, rate-limited.
      security: []
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: HTML dashboard.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid customer ID (plain text).
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Customer not found (plain text).
          content:
            text/plain:
              schema:
                type: string

  /v1/portal/{tenant_id}/{customer_id}:
    get:
      operationId: getPortalData
      tags: [Customer Portal]
      summary: Read-only portal data (JSON)
      description: Unauthenticated, rate-limited JSON payload consumed by the React portal — customer profile, subscriptions, and invoices.
      security: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Portal payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: [string, 'null']
                      email:
                        type: string
                        format: email
                  subscriptions:
                    type: [array, 'null']
                    items:
                      $ref: '#/components/schemas/Subscription'
                  invoices:
                    type: [array, 'null']
                    items:
                      $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /portal/auth/request:
    post:
      operationId: requestPortalMagicLink
      tags: [Customer Portal]
      summary: Request a magic login link
      description: Emails a passwordless login link to the customer. Always responds positively so email existence is not revealed.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Link sent (or silently skipped for unknown emails).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  _dev_link:
                    type: string
                    description: Verification link — exposed only when APP_ENV=development.
        '400':
          $ref: '#/components/responses/BadRequest'

  /portal/auth/verify:
    get:
      operationId: verifyPortalMagicLink
      tags: [Customer Portal]
      summary: Verify a magic link and start a session
      description: Exchanges the emailed token for a 7-day portal session. The session token is also set as the `portal_session` cookie.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  session_token:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portal/api/profile:
    get:
      operationId: getPortalProfile
      tags: [Customer Portal]
      summary: Get the logged-in customer's profile
      security:
        - portalSession: []
      responses:
        '200':
          description: The customer profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portal/api/invoices:
    get:
      operationId: getPortalInvoices
      tags: [Customer Portal]
      summary: List the logged-in customer's invoices
      security:
        - portalSession: []
      responses:
        '200':
          description: The customer's invoices.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portal/api/redeem:
    post:
      operationId: portalRedeemGift
      tags: [Customer Portal]
      summary: Redeem a gift code as the logged-in customer
      security:
        - portalSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Gift redeemed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portal/api/logout:
    post:
      operationId: portalLogout
      tags: [Customer Portal]
      summary: Log out of the customer portal
      description: Clears the `portal_session` cookie.
      security:
        - portalSession: []
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /v1/analytics/usage:
    get:
      operationId: getUsageStats
      tags: [Analytics]
      summary: Aggregate usage by dimension
      description: Total metered quantity per usage dimension. Responses are cached for up to 5 minutes.
      responses:
        '200':
          description: Usage totals per dimension.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/analytics/dunning/overview:
    get:
      operationId: getDunningOverview
      tags: [Dunning]
      summary: Dunning retry overview
      description: Aggregate retry counts and success rate for the smart dunning engine. Cached for up to 5 minutes.
      responses:
        '200':
          description: Dunning overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DunningOverview'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/analytics/dunning/weights:
    get:
      operationId: getDunningWeights
      tags: [Dunning]
      summary: Learned dunning retry weights
      description: Expected-reward weights learned per customer context and retry action. Cached for up to 5 minutes.
      responses:
        '200':
          description: Learned weights.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DunningWeight'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/analytics/dunning/history:
    get:
      operationId: getDunningHistory
      tags: [Dunning]
      summary: Recent dunning retry attempts
      description: Chronological log of individual retry attempts and outcomes. Cached for up to 5 minutes.
      parameters:
        - name: limit
          in: query
          description: Maximum records to return (values outside 1-200 fall back to 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Retry history.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DunningHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/analytics/ask:
    post:
      operationId: askAnalytics
      tags: [Analytics]
      summary: Ask a natural-language analytics question
      description: Uses an LLM to translate the question into tenant-scoped SQL, runs it, and returns both the rows and the generated query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  examples: ["What was my MRR growth over the last 3 months?"]
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Result rows for the generated SQL query.
                  query:
                    type: string
                    description: The generated SQL that produced the rows.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/developer/keys:
    get:
      operationId: listAPIKeys
      tags: [Developer]
      summary: List API keys
      responses:
        '200':
          description: API keys for the tenant (raw key values are never returned here).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAPIKey
      tags: [Developer]
      summary: Create an API key
      description: Generates a new secret key. The raw `key_value` is returned only in this response.
      responses:
        '201':
          description: Key created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/account:
    get:
      operationId: getAccount
      tags: [Account]
      summary: Get the tenant account
      responses:
        '200':
          description: The tenant account.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateAccount
      tags: [Account]
      summary: Update the tenant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Updated account.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ledger/accounts:
    get:
      operationId: listLedgerAccounts
      tags: [Finance]
      summary: List ledger accounts
      description: Double-entry ledger accounts (cash, accounts receivable, revenue, etc.) for the tenant.
      responses:
        '200':
          description: Ledger accounts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ledger/entries:
    get:
      operationId: listLedgerEntries
      tags: [Finance]
      summary: List ledger entries for an account
      parameters:
        - name: account_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ledger transfers touching the account.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerTransaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/finance/reconciliation:
    get:
      operationId: runReconciliation
      tags: [Finance]
      summary: Run an on-demand ledger reconciliation
      description: |
        Reconciles the tenant's invoices against its Postgres ledger entries and
        returns the computed drift report. Nothing is persisted. When TigerBeetle
        is connected its transfers are enumerated and compared against the
        PostgreSQL ledger (missing_in_tigerbeetle / missing_in_postgres /
        tb_amount_mismatch); otherwise `tb_compared` is false with the
        reason in `tb_skip_reason`.
      responses:
        '200':
          description: Reconciliation report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ReconciliationReport'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/finance/revrec/report:
    get:
      operationId: getRevRecReport
      tags: [Finance]
      summary: Revenue recognition report
      description: Recognized vs. deferred revenue for the requested month.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
      responses:
        '200':
          description: Revenue recognition report for the period.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Report payload (recognized/deferred totals and breakdown rows).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/settings/gst:
    get:
      operationId: getGSTConfig
      tags: [Settings]
      summary: Get GST configuration
      description: Returns the tenant's Indian GST configuration, or sensible defaults when unconfigured.
      responses:
        '200':
          description: GST configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GSTConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateGSTConfig
      tags: [Settings]
      summary: Update GST configuration
      description: When a GSTIN is supplied without a state code, the state is derived from the GSTIN prefix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GSTConfig'
      responses:
        '200':
          description: Configuration saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GSTConfig'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/settings/gst/validate:
    post:
      operationId: validateGSTIN
      tags: [Settings]
      summary: Validate a GSTIN
      description: Checks the GSTIN format and, when valid, returns the parsed state and PAN components.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gstin:
                  type: string
                  minLength: 15
                  maxLength: 15
      responses:
        '200':
          description: Validation result (returned for both valid and invalid GSTINs).
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  state_code:
                    type: string
                    description: Present when valid.
                  state_name:
                    type: string
                    description: Present when valid.
                  pan:
                    type: string
                    description: Present when valid.
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/settings/irp:
    get:
      operationId: getIRPConfig
      tags: [Settings]
      summary: Get IRP (e-invoicing) configuration
      description: Returns the tenant's Invoice Registration Portal credentials with secrets masked.
      responses:
        '200':
          description: IRP configuration (client secret and password masked).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IRPConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateIRPConfig
      tags: [Settings]
      summary: Create or update IRP credentials
      description: Upserts IRP credentials for the tenant. `environment` defaults to `sandbox`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IRPConfig'
      responses:
        '200':
          description: Configuration saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IRPConfig'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/settings/irp/test:
    post:
      operationId: testIRPConnection
      tags: [Settings]
      summary: Test the IRP connection
      description: Validates that saved IRP credentials are complete and enabled.
      responses:
        '200':
          description: Test outcome (also returned when credentials are incomplete or disabled).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/consents:
    post:
      operationId: recordConsent
      tags: [Consents]
      summary: Record customer consent
      description: Captures a consent record (RBI recurring-billing compliance) with an IP/user-agent audit trail taken from the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, consent_type, granted]
              properties:
                customer_id:
                  type: string
                  format: uuid
                subscription_id:
                  type: string
                  format: uuid
                consent_type:
                  type: string
                  enum: [recurring_billing, email_marketing, data_processing, terms_of_service, privacy_policy]
                granted:
                  type: boolean
                consent_text:
                  type: string
                  description: Exact text shown to the customer. Defaults to the standard recurring-billing text.
      responses:
        '201':
          description: Consent recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/consents/revoke:
    post:
      operationId: revokeConsent
      tags: [Consents]
      summary: Revoke a consent record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consent_id]
              properties:
                consent_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Consent revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/customers/{id}/consents:
