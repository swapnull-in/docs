        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createReferral
      tags: [Referrals]
      summary: Create a referral
      description: Links a referrer to a referred customer. Self-referrals and duplicate referrals are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [referrer_id, referred_id]
              properties:
                referrer_id:
                  type: string
                  format: uuid
                referred_id:
                  type: string
                  format: uuid
                reward_amount:
                  type: integer
                  format: int64
                  default: 500
                  description: Reward in the lowest currency unit (defaults to 500 = $5.00).
                currency:
                  type: string
                  default: USD
      responses:
        '201':
          description: Referral created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Referral'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/referrals/generate-code:
