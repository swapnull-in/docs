          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: The customer's referral code.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
