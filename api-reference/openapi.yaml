                    items: { $ref: "#/components/schemas/Entitlement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/customers/{id}/entitlements:
    get:
      tags: [Entitlements]
      summary: Effective entitlements for a customer
      description: >-
        Union over the customer's active and trialing subscriptions' plans —
        booleans are granted if any plan grants them; limits resolve to the
        maximum across plans.
      operationId: getCustomerEntitlements
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Effective entitlement set with granting plan ids
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        feature_key: { type: string }
                        kind: { type: string, enum: [boolean, limit] }
                        bool_value: { type: boolean, nullable: true }
                        limit_value: { type: integer, format: int64, nullable: true }
                        plan_ids:
                          type: array
                          items: { type: string, format: uuid }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/entitlements/check:
    get:
      tags: [Entitlements]
      summary: Fast single-feature entitlement check
      description: The hot path for feature gating — one indexed query.
      operationId: checkEntitlement
      parameters:
        - { name: customer_id, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: feature, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Grant answer
          content:
            application/json:
              schema:
                type: object
                properties:
                  feature_key: { type: string }
                  granted: { type: boolean }
                  limit_value: { type: integer, format: int64, nullable: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/usage:
    get:
      operationId: queryUsage
      tags: [Usage]
      summary: Time-windowed usage buckets
      description: >
        Aggregates usage events into `date_trunc`'d time buckets. At least one
        of `subscription_id` or `customer_id` is required. The window defaults
        to the last 30 days.
      parameters:
        - { name: subscription_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: customer_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: dimension, in: query, required: false, schema: { type: string }, description: Filter to a single dimension. }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time }, description: "Window start (RFC3339, inclusive). Default: to - 30 days." }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time }, description: "Window end (RFC3339, exclusive). Default: now." }
        - { name: granularity, in: query, required: false, schema: { type: string, enum: [day, month], default: day } }
      responses:
        '200':
          description: Usage buckets plus the resolved window.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageBucket'
                  from: { type: string, format: date-time }
                  to: { type: string, format: date-time }
                  granularity: { type: string, enum: [day, month] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/usage/dimensions:
    get:
      operationId: listUsageDimensions
      tags: [Usage]
      summary: Usage dimension catalog
      description: Distinct usage dimensions the tenant has reported, with first/last seen timestamps and event counts.
      responses:
        '200':
          description: Dimension catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageDimension'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/subscriptions/{id}/usage:
    get:
      operationId: getSubscriptionUsage
      tags: [Usage]
      summary: Current-period usage for a subscription
      description: >
        Per-dimension usage inside the subscription's current billing period
        plus lifetime totals — the "you've used 4,231 of 10,000 api_calls"
        view. When the customer holds an entitlement limit for a feature_key
        equal to the dimension name, `limit_value` and `remaining` are
        populated (null otherwise; `remaining` may be negative when over the
        limit).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Subscription usage report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionUsage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Tenant API key obtained from `POST /auth/register` or `POST /v1/developer/keys`.
    portalSession:
      type: apiKey
      in: cookie
      name: portal_session
      description: Customer-portal session cookie issued by `GET /portal/auth/verify`.

  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SearchQuery:
      name: q
      in: query
      description: Free-text search filter.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      description: Records per page (capped at 250).
      schema:
        type: integer
        minimum: 1
        maximum: 250
        default: 50
    AccountingProvider:
      name: provider
      in: path
      required: true
      description: Accounting provider.
      schema:
        type: string
        enum: [quickbooks, xero]

  responses:
    BadRequest:
      description: The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Entitlement:
      type: object
      properties:
        id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        feature_key: { type: string }
        kind: { type: string, enum: [boolean, limit] }
        bool_value: { type: boolean, nullable: true }
        limit_value: { type: integer, format: int64, nullable: true }
    EntitlementInput:
      type: object
      required: [feature_key, kind]
      properties:
        feature_key: { type: string }
        kind: { type: string, enum: [boolean, limit] }
        bool_value: { type: boolean }
        limit_value: { type: integer, format: int64 }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          description: Structured error detail.
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              examples: [BAD_REQUEST, UNAUTHORIZED, NOT_FOUND, CONFLICT, VALIDATION_ERROR, INVALID_API_KEY, RATE_LIMITED, INTERNAL_ERROR]
            message:
              type: string
              description: Human-readable explanation.

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        components:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              error:
                type: string

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        data_region:
          type: string
        base_currency:
          type: string
          description: ISO 4217 code (default USD).
        organization_id:
          type: [string, 'null']
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required: [name, code, interval_unit, interval_count, amount, currency]
      properties:
        name:
          type: string
        code:
          type: string
          description: Unique plan code (e.g. `gold-monthly`).
        interval_unit:
          type: string
          enum: [day, week, month, year]
        interval_count:
          type: integer
          minimum: 1
        amount:
          type: integer
          format: int64
          description: Price in the lowest currency unit (e.g. cents/paise).
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 code.

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        interval_unit:
          type: string
          enum: [day, week, month, year]
        interval_count:
          type: integer
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        prices:
          type: array
          items:
            $ref: '#/components/schemas/Price'

    Price:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        currency:
          type: string
          description: ISO 4217 code.
        amount:
          type: integer
          format: int64
          description: Price in the lowest currency unit.
        type:
          type: string
          enum: [recurring, one_time]
        created_at:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        tax_id:
          type: string
        gstin:
          type: string
          description: Indian GST identification number (B2B customers).
        tax_type:
          type: string
          enum: [business, consumer]
        place_of_supply:
          type: string
          description: Indian state code for GST place of supply.
        line1:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 code.

    BillingAddress:
      type: object
      properties:
        line1:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: [string, 'null']
        phone:
          type: string
        tax_id:
          type: [string, 'null']
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        ledger_account_id:
          type: string
          format: uuid
        gstin:
          type: [string, 'null']
        tax_type:
          type: string
        place_of_supply:
          type: [string, 'null']
        referral_code:
          type: [string, 'null']
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
        risk_factors:
          type: [object, 'null']
        card_brand:
          type: string
        card_last4:
          type: string
        card_exp_month:
          type: integer
        card_exp_year:
          type: integer
        card_token_id:
          type: string
        card_fingerprint:
          type: string
        created_at:
          type: string
          format: date-time

    SubscriptionStatus:
      type: string
      enum: [trialing, active, past_due, paused, canceled, unpaid]

    CreateSubscriptionRequest:
      type: object
      required: [customer_id, plan_id]
      properties:
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        coupon_code:
          type: string
        start_date:
          type: string
          format: date-time
        billing_anchor_type:
          type: string
          enum: [acquisition, first_of_month]
        payment_terms:
          type: string
          enum: [net0, net15, net30, net60]

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        canceled_at:
          type: string
          format: date-time
        cancellation_reason:
          type: string
        cancellation_feedback:
          type: string
        billing_anchor:
          type: string
          format: date-time
        billing_anchor_type:
          type: string
        billing_anchor_day:
          type: integer
        payment_terms:
          type: string
        coupon_id:
          type: string
          format: uuid
        reference_id:
          type: string
        mandate_id:
          type: string
          format: uuid
        razorpay_subscription_id:
          type: string
        stripe_subscription_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CancelSubscriptionRequest:
      type: object
      required: [reason]
      properties:
        cancel_at_period_end:
          type: boolean
          description: Defaults to true when `immediately` is false.
        immediately:
          type: boolean
        reason:
          type: string
          enum:
            - too_expensive
            - not_using
            - switching_competitor
            - missing_features
            - technical_issues
            - customer_service
            - temporary_pause
            - other
        feedback:
          type: string
        revoke_consent:
          type: boolean
          description: Also revoke the recurring-payment consent (RBI compliance).

    CancelSubscriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        cancel_at_period_end:
          type: boolean
        cancelled_at:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancellation_reason:
          type: string
        message:
          type: string

    UnbilledCharge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        amount:
          type: integer
          format: int64
          description: Amount in the lowest currency unit.
        currency:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, invoiced, canceled]
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        subscription_id:
          type: [string, 'null']
          format: uuid
        customer_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        billing_reason:
          type: string
        amount_due:
          type: integer
          format: int64
        amount_paid:
          type: integer
          format: int64
        currency:
          type: string
        subtotal:
          type: integer
          format: int64
        tax_amount:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        igst_amount:
          type: integer
          format: int64
        cgst_amount:
          type: integer
          format: int64
        sgst_amount:
          type: integer
          format: int64
        hsn_code:
          type: string
        irn:
          type: string
          description: Invoice Reference Number issued by the IRP (Indian e-invoicing).
        ack_no:
          type: string
        signed_qr_code:
          type: string
        e_invoice_status:
          type: string
        ack_date:
          type: string
        e_invoice_retry_count:
          type: integer
        e_invoice_next_retry_at:
          type: [string, 'null']
          format: date-time
        e_invoice_error_message:
          type: string
        tds_amount:
          type: integer
          format: int64
        status:
          type: string
          enum: [draft, open, paid, void, uncollectible, past_due]
        created_at:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
        payment_terms:
          type: string
        exchange_rate:
          type: number
        base_currency_total:
          type: integer
          format: int64
        base_currency:
          type: string
        next_retry_at:
          type: string
          format: date-time
        retry_count:
          type: integer
        payment_wall_active:
          type: boolean

    EInvoiceStatus:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        e_invoice_status:
          type: string
        irn:
          type: string
        ack_no:
          type: string
        ack_date:
          type: string
        signed_qr_code:
          type: string
        retry_count:
          type: integer
        next_retry_at:
          type: [string, 'null']
          format: date-time
        error_message:
          type: string

    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        discount_type:
          type: string
          enum: [percent, amount]
        discount_value:
          type: integer
          format: int64
        duration:
          type: string
          enum: [forever, once, repeating]
        duration_months:
          type: [integer, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreditNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        invoice_id:
          type: [string, 'null']
          format: uuid
        reference:
          type: [string, 'null']
        amount:
          type: integer
          format: int64
        balance:
          type: integer
          format: int64
          description: Remaining unapplied credit.
        currency:
          type: string
        status:
          type: string
          enum: [issued, used, void]
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        customer:
          $ref: '#/components/schemas/Customer'

    QuoteStatus:
      type: string
      enum: [draft, sent, accepted, declined, expired]

    LineItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
        unit_price:
          type: integer
          description: Price per unit in the lowest currency unit.
        amount:
          type: integer
          description: quantity x unit_price, in the lowest currency unit.

    CreateQuoteRequest:
      type: object
      required: [customer_id, line_items]
      properties:
        customer_id:
          type: string
          format: uuid
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItem'
        currency:
          type: string
        valid_until:
          type: [string, 'null']
          format: date-time
        notes:
          type: string
        terms:
          type: string
        tax_amount:
          type: integer
        discount_amount:
          type: integer

    Quote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        quote_number:
          type: string
        status:
          $ref: '#/components/schemas/QuoteStatus'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        subtotal:
          type: integer
        tax_amount:
          type: integer
        discount_amount:
          type: integer
        total:
          type: integer
        currency:
          type: string
        valid_until:
          type: [string, 'null']
          format: date-time
        notes:
          type: string
        terms:
          type: string
        invoice_id:
          type: [string, 'null']
          format: uuid
          description: Set once the quote has been converted to an invoice.
        accepted_at:
          type: [string, 'null']
          format: date-time
        declined_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    QuoteActionResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Quote'
        message:
          type: string

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        secret:
          type: string
          description: HMAC signing secret. Returned only on creation.
        events:
          type: array
          items:
            type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          examples: [invoice.paid]
        object_type:
          type: string
        object_id:
          type: string
          format: uuid
        data:
          type: object
        created_at:
          type: string
          format: date-time

    EventDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        webhook_endpoint_id:
          type: string
          format: uuid
        endpoint_url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, succeeded, failed]
          description: >
            Derived delivery state. `pending` deliveries are still being
            retried by the worker; `failed` means retries were exhausted.
        attempts:
          type: integer
          description: Number of delivery attempts made so far.
        last_status_code:
          type: integer
          description: HTTP status of the most recent attempt. Omitted when no response was received (transport error or no attempt yet).
        last_error:
          type: string
          description: >
            Failure reason of the most recent attempt (transport error or
            "HTTP <code>: <body>"). Omitted for succeeded deliveries.
        next_retry_at:
          type: string
          format: date-time
          description: When the worker will retry next. Omitted once terminal or before the first attempt.
        delivered_at:
          type: string
          format: date-time
          description: When the delivery reached a terminal state.
        created_at:
          type: string
          format: date-time

    MRRMetrics:
      type: object
      properties:
        currency:
          type: string
          description: The reporting currency.
        amount:
          type: integer
          format: int64
          description: FX-normalized MRR total in the reporting currency, minor units.
        mrr:
          type: integer
          format: int64
          description: Alias of the normalized total.
        normalized_mrr:
          type: integer
          format: int64
        reporting_currency:
          type: string
