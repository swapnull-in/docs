      summary: Purchase a gift subscription
      description: Buys a plan as a gift and returns the redemption code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [buyer_customer_id, plan_id, duration_months]
              properties:
                buyer_customer_id:
                  type: string
                  format: uuid
                plan_id:
                  type: string
                  format: uuid
                recipient_email:
                  type: string
                  format: email
                duration_months:
                  type: integer
