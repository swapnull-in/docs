          type: string
          enum: [email, sms, in_app]
        delay_hours:
          type: integer
        template_name:
          type: string
        subject:
          type: string
        body:
          type: string
        is_payment_wall:
          type: boolean
        created_at:
          type: string
          format: date-time

    UsageBucket:
      type: object
      description: One date_trunc'd time bucket of aggregated usage.
      properties:
        period:
          type: string
          format: date-time
          description: Bucket start (date_trunc of the event timestamps).
        dimension:
          type: string
          examples: [api_calls]
        quantity:
          type: integer
          format: int64

    UsageDimension:
      type: object
      description: A dimension-catalog row for the tenant.
      properties:
        dimension:
          type: string
        event_count:
          type: integer
          format: int64
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time

    SubscriptionDimensionUsage:
      type: object
      description: >
        One dimension's usage for a subscription. limit_value/remaining are
        populated only when the customer holds an entitlement limit for a
        feature_key equal to the dimension name.
      properties:
        dimension:
          type: string
        period_quantity:
          type: integer
          format: int64
          description: Total inside the current billing period.
        lifetime_quantity:
          type: integer
          format: int64
        limit_value:
          type: [integer, 'null']
          format: int64
          description: Effective entitlement limit, or null when none exists.
        remaining:
          type: [integer, 'null']
          format: int64
          description: limit_value - period_quantity (negative when over the limit); null when limit_value is null.

    SubscriptionUsage:
      type: object
      description: Per-subscription usage report (GET /v1/subscriptions/{id}/usage).
      properties:
        subscription_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionDimensionUsage'

    InvoiceDispute:
      type: object
      description: A customer-raised dispute/query against one of their invoices.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        reason:
          type: string
        status:
          type: string
          enum: [open, resolved]
        note:
          type: [string, 'null']
          description: Admin resolution note; null while open.
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: [string, 'null']
          format: date-time

    SubscriptionAddon:
      type: object
      description: >
        An existing plan attached to a subscription with a quantity
        (Multi-product catalog v1). Billed as an extra line — add-on plan price ×
        quantity, taxed independently — from the subscription's next recurring
        invoice.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
          description: The plan billed as an add-on.
        quantity:
          type: integer
          description: Number of add-on units billed each period.
        created_at:
          type: string
          format: date-time
    User:
      type: object
      description: A dashboard user account within a tenant.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, member]
      required: [id, email, name, role]

    # --- Phase 3 auth schemas ---
    OAuthProviderStatus:
      type: object
      properties:
        name: { type: string, enum: [google, github] }
        enabled: { type: boolean }
      required: [name, enabled]
    SSOConnection:
      type: object
      properties:
        tenant_id: { type: string, format: uuid }
        idp_entity_id: { type: string }
        idp_sso_url: { type: string }
        idp_certificate: { type: string, description: Base64/PEM X.509 signing certificate. }
        idp_metadata_xml: { type: string, description: Optional full IdP metadata; takes precedence over the discrete fields. }
        enabled: { type: boolean }
        configured: { type: boolean, description: Whether the connection has enough IdP detail to attempt a login. }
        sp_metadata_url: { type: string, description: Public SP metadata URL to hand to the IdP. }
        sp_acs_url: { type: string, description: Public SP Assertion Consumer Service URL. }
      required: [tenant_id, enabled, configured]
    SSOConnectionUpsertRequest:
      type: object
      properties:
        idp_entity_id: { type: string }
        idp_sso_url: { type: string }
        idp_certificate: { type: string }
        idp_metadata_xml: { type: string }
        enabled: { type: boolean }
