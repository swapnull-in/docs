      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, recipient_customer_id]
              properties:
                code:
                  type: string
                recipient_customer_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: The subscription created by the redemption.
