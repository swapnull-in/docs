  /v1/entitlements/check:
    get:
      tags: [Entitlements]
      summary: Fast single-feature entitlement check
      description: The hot path for feature gating — one indexed query.
      operationId: checkEntitlement
      parameters:
        - { name: customer_id, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: feature, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Grant answer
          content:
            application/json:
              schema:
                type: object
                properties:
                  feature_key: { type: string }
                  granted: { type: boolean }
                  limit_value: { type: integer, format: int64, nullable: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/usage:
    get:
      operationId: queryUsage
      tags: [Usage]
      summary: Time-windowed usage buckets
      description: >
        Aggregates usage events into `date_trunc`'d time buckets. At least one
        of `subscription_id` or `customer_id` is required. The window defaults
        to the last 30 days.
      parameters:
        - { name: subscription_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: customer_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: dimension, in: query, required: false, schema: { type: string }, description: Filter to a single dimension. }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time }, description: "Window start (RFC3339, inclusive). Default: to - 30 days." }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time }, description: "Window end (RFC3339, exclusive). Default: now." }
        - { name: granularity, in: query, required: false, schema: { type: string, enum: [day, month], default: day } }
      responses:
        '200':
          description: Usage buckets plus the resolved window.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageBucket'
                  from: { type: string, format: date-time }
                  to: { type: string, format: date-time }
                  granularity: { type: string, enum: [day, month] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/usage/dimensions:
    get:
      operationId: listUsageDimensions
      tags: [Usage]
      summary: Usage dimension catalog
